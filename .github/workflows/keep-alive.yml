name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping rdos.rdsolucoes.eco.br
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://rdos.rdsolucoes.eco.br/health || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Site online e respondendo."
          else
            echo "Site retornou $STATUS -- pode estar iniciando."
          fi
