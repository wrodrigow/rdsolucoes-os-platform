{% extends "base.html" %}
{% block title %}Acesso negado — RD OS{% endblock %}

{% block content %}
<section style="min-height:70vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;">
  <div style="text-align:center;padding:40px 20px;max-width:480px;">
    <div style="font-size:5rem;font-weight:900;background:linear-gradient(135deg,#1a5fa8,#0d7d8c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:16px;">403</div>
    <h1 style="font-size:1.4rem;font-weight:800;color:#1e293b;margin-bottom:10px;">Acesso negado</h1>
    <p style="font-size:0.92rem;color:#64748b;margin-bottom:28px;line-height:1.7;">Você não tem permissão para acessar esta página. Faça login com uma conta autorizada.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('main.home') }}" class="btn-primary">Ir para o Início</a>
      <a href="{{ url_for('auth.login') }}" style="display:inline-flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #e2e8f0;color:#374151;font-weight:600;padding:12px 24px;border-radius:8px;text-decoration:none;font-size:0.9rem;">Fazer Login</a>
    </div>
  </div>
</section>
{% endblock %}
